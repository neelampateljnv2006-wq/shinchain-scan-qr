<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance - QR Attendance</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="#" onclick="showSection('scanSection')">Scan QR</a>
      <a href="#" onclick="showSection('historySection')">My Attendance</a>
    </div>
    
    <div class="card">
      <h1>📱 Mark Attendance</h1>
      <p style="text-align: center; margin-bottom: 20px;">Welcome, <span id="studentName"></span></p>
      
      <div id="message"></div>
      
      <div id="scanSection" class="dashboard-section">
        <p style="text-align: center; margin-bottom: 16px;">
          Point your camera at the QR code displayed by your teacher
        </p>
        
        <div id="qr-reader" style="width: 100%; border-radius: 8px; overflow: hidden; background: #f0f0f0;"></div>
        
        <div style="margin-top: 20px;">
            <button id="startBtn" onclick="startScanner()">Start Camera</button>
            <button id="stopBtn" onclick="stopScanner()" style="display: none; background-color: #ff4444;">Stop Camera</button>
        </div>
      </div>
      
      <div id="historySection" class="dashboard-section" style="display: none;">
        <h2>My Attendance History</h2>
        <div id="attendanceList"></div>
      </div>
      
      <button class="logout-btn" onclick="logout()" style="margin-top: 20px; background: #ff4757;">Logout</button>
    </div>
  </div>
  
  <script src="student-logic.js"></script>
</body>
</html>
