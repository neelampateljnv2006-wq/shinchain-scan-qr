<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - QR Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="#" onclick="showSection('generateSection')">Generate QR</a>
      <a href="#" onclick="showSection('historySection')">History</a>
    </div>
    
    <div class="card">
      <h1>👨‍🏫 Teacher Dashboard</h1>
      <p style="text-align: center; margin-bottom: 20px;">Welcome, <span id="teacherName">...</span></p>
      
      <div id="message"></div>
      
      <div id="generateSection" class="dashboard-section">
        <form id="qrForm">
          <div class="form-group">
            <label for="subject">Subject / Class</label>
            <input type="text" id="subject" placeholder="e.g., Mathematics 101" required>
          </div>
          
          <div class="form-group">
            <label for="duration">QR Valid For (minutes)</label>
            <select id="duration">
              <option value="5">5 minutes</option>
              <option value="10" selected>10 minutes</option>
              <option value="15">15 minutes</option>
              <option value="30">30 minutes</option>
            </select>
          </div>
          
          <button type="submit">Generate QR Code</button>
        </form>
        
        <div id="qrResult" style="text-align: center; margin-top: 20px;">
          </div>
      </div>
      
      <div id="historySection" class="dashboard-section" style="display: none;">
        <h2>Session History</h2>
        <div id="sessionList"></div>
      </div>
      
      <button class="logout-btn" style="margin-top: 30px; background: #ff4757;" onclick="logout()">Logout</button>
    </div>
  </div>
  
  <script src="teacher-logic.js"></script>
</body>
</html>
